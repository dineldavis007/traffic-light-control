    <h1>🚦 Traffic Light Control System</h1>

    <p>
        This project uses Arduino UNO and Java Swing GUI
        to control traffic lights using serial communication.
    </p>

    <h2>Features</h2>

    <ul>
        <li>Red Light Control</li>
        <li>Yellow Light Control</li>
        <li>Green Light Control</li>
        <li>Buzzer Alert</li>
        <li>Standard Checking Mode</li>
    </ul>
